<style>
  :root {
    --page-bg: #f4f4f4;
    --card-bg: #d9dee2;
    --card-open-bg: #dfe4e8;
    --card-border: #cfd5d9;
    --text: #111111;
    --muted: #4b5563;
    --radius: 1.7rem;

    --peek-height: 10.2rem;
    --img-size: 8.6rem;
    --gap: 0.8rem;
    --reveal-width: 48%;
  }
  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--page-bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  .workout-cards {
    width: 100%;
    margin: 0;
    padding: 0.75rem;
    display: grid;
    gap: 0.8rem;
  }
  .wcard__peek {
    all: unset;
    display: block;
    width: 100%;
    cursor: pointer;
  }

  .wcard__panel {
    position: relative;
    min-height: var(--peek-height);
    height: var(--peek-height);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--card-border);
    background: #ffffff;
    box-shadow: 0 1px 1px rgba(0, 0, 0, 0.03);
  }
  /* revealed content underneath */
  .wcard__body {
    position: absolute;
    inset: 0;
    padding: 0.85rem 0.9rem;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }

  /* visible card face on top */
.wcard__front {
  position: relative;
  z-index: 2;
  height: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  align-items: stretch;
  background: var(--card-bg);
  border-radius: var(--radius);
  transform: translateX(0);
  transition: transform 220ms ease, background-color 220ms ease;
}
  .wcard__front {
    position: relative;
    z-index: 2;
    min-height: var(--peek-height);
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: stretch;
    background: var(--card-bg);
    border-radius: var(--radius);
    transform: translateX(0);
    transition: transform 220ms ease, background-color 220ms ease;
  }

  .wcard__text-slot {
    min-width: 0;
    display: flex;
    align-items: center;
    padding: 0.9rem 0.8rem 0.9rem 1rem;
  }

  .wcard__name {
    font-size: 1.1rem;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    word-break: break-word;
    max-width: 8ch;
  }

  .wcard__image-slot {
    width: calc(var(--img-size) + 2rem);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.6rem 1rem;
    flex-shrink: 0;
  }
  .wcard__image {
    width: var(--img-size);
    height: var(--img-size);
    padding-left: 1rem;
    object-fit: contain;
    object-position: center;
    display: block;
  }
  .wcard__dump {
    margin: 0;
    width: calc(100% - (100% - var(--reveal-width)));
    max-width: 100%;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 0.7rem;
    line-height: 1.25;
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  /* horizontal reveal */
  .wcard.is-open .wcard__front {
    transform: translateX(var(--reveal-width));
    background: var(--card-open-bg);
  }

  @media (min-width: 390px) {
    :root {
      --peek-height: 22rem;
      --img-size: 20rem;
      --reveal-width: 60%;
    }

    .wcard__name {
      font-size: 1.18rem;
      max-width: 18ch;
    }

    .wcard__dump {
      font-size: 0.74rem;
    }
  }
  @media (min-width: 900px) {
  .workout-cards {
    margin: 0 auto;
    padding: 1rem;
  }
}
</style>

<div class="workout-cards">
  {% for line in lines %}
    <article class="wcard" data-card>
      <button
        type="button"
        class="wcard__peek"
        data-card-toggle
        aria-expanded="false"
      >
        <div class="wcard__panel">
          <div class="wcard__body">
            <pre class="wcard__dump">
{
  "name": "{{ line.name }}",
  "detail":
  {% match line.detail %}
    {% when WorkoutDetail::Simple with { sets, reps } %}
      {
        "type": "simple",
        "sets": {{ sets }},
        "reps": {{ reps }}
      }
    {% when WorkoutDetail::Advanced with { items } %}
      {
        "type": "advanced",
        "items": [
          {% for item in items %}
          {
            "reps": {{ item.reps }},
            "percent": {{ item.percent }}
          }{% if !loop.last %},{% endif %}
          {% endfor %}
        ]
      }
  {% endmatch %},
  "rest":
  {% match line.rest %}
    {% when Some with (rest) %}
      "{{ rest.display() }}"
    {% when None %}
      null
  {% endmatch %}
}
            </pre>
          </div>

          <div class="wcard__front">

            <div class="wcard__image-slot">
              <img
                class="wcard__image"
                src="file:///home/leaf/Dev/projects/fitapp/assets/squat.svg"
                alt="{{ line.name }}"
              />
            </div>
            <div class="wcard__text-slot">
              <div class="wcard__name">{{ line.name }}</div>
            </div>

          </div>
        </div>
      </button>
    </article>
  {% endfor %}
</div>

<script>
  document.addEventListener("click", function (event) {
    const toggle = event.target.closest("[data-card-toggle]");
    if (!toggle) return;

    const card = toggle.closest("[data-card]");
    const expanded = toggle.getAttribute("aria-expanded") === "true";

    toggle.setAttribute("aria-expanded", expanded ? "false" : "true");
    card.classList.toggle("is-open", !expanded);
  });
</script>
