<style>
  :root {
    --page-bg: #1A1B26;
        --panel-bg: #24283B;
        --panel-body-bg: #565F89;
        --card-bg: #414868;
        --card-open-bg: #414868;
        --card-border: #565F89;
        --adv-cell-bg: #7AA2F7;
        --adv-cell-border: #565F89;
        --text: #C3CdF8;
        --muted: #A9B1D6;
        --fallback-text: #7D86B2;
        --icon-color: #1A1B26;
        --shadow-color: rgba(26, 27, 38, 0.36);

    --radius: 1.7rem;
    --peek-height: 10.2rem;
    --img-size: 8.6rem;
    --gap: 0.8rem;
    --reveal-width: 48%;
    --big-rep-size: clamp(2.4rem, 7vw, 5rem);
  }
  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--page-bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  .workout-cards {
    width: 100%;
    margin: 0;
    padding: 0.75rem;
    display: grid;
    gap: 0.8rem;
  }
  .wcard__peek {
    all: unset;
    display: block;
    width: 100%;
    cursor: pointer;
  }
  .wcard__panel {
    position: relative;
    min-height: var(--peek-height);
    height: var(--peek-height);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--card-border);
    background: var(--panel-bg);
    box-shadow: 0 1px 1px var(--shadow-color);
  }
  /* revealed content underneath */
  .wcard__body {
    position: absolute;
    inset: 0;
    padding: 0.85rem 0.9rem;
    background: var(--panel-body-bg);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }

  /* visible card face on top */
  .wcard__front {
    position: relative;
    z-index: 2;
    min-height: var(--peek-height);
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: stretch;
    background: var(--card-bg);
    border-radius: var(--radius);
    transform: translateX(0);
    transition: transform 220ms ease, background-color 220ms ease;
  }
  .wcard__text-slot {
    min-width: 0;
    display: flex;
    align-items: center;
    padding: 0.9rem 0.8rem 0.9rem 1rem;
  }

  .wcard__name {
    font-size: var(--big-rep-size);
    font-weight: 700;
    letter-spacing: 0.015em;
    text-transform: uppercase;
    word-break: break-word;
    text-align: right;
    max-width: 11ch;
  }
  .wcard__image-slot {
    width: calc(var(--img-size) + 2rem);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.6rem 1rem;
    flex-shrink: 0;
  }
  .wcard__image {
    width: var(--img-size);
    height: var(--img-size);
    padding-left: 1rem;
    object-fit: contain;
    object-position: center;
    display: block;
  }
  .wcard__svg-wrap {
    width: var(--img-size);
    height: var(--img-size);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--icon-color);
  }

  .wcard__svg-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .wcard__svg-wrap svg,
  .wcard__svg-wrap svg * {
    fill: currentColor;
    stroke: currentColor;
  }
  .wcard__svg-fallback {
    width: clamp(4.8rem, var(--img-size), 8.8rem);
    height: clamp(4.8rem, var(--img-size), 8.8rem);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--fallback-text);
  }
   .wcard__dump {
      margin: 0;
      width: calc(100% - (100% - var(--reveal-width)));
      max-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

  .wcard__adv-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    align-content: center;
  }
  .wcard__simple-big {
    font-size: var(--big-rep-size);
    line-height: 0.95;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .wcard__adv-cell {
    min-height: 5.25rem;
    padding: 0.7rem 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: var(--big-rep-size);
    line-height: 0.95;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text);
    white-space: nowrap;
  }
  /* horizontal reveal */
  .wcard.is-open .wcard__front {
    transform: translateX(var(--reveal-width));
    background: var(--card-open-bg);
  }

  @media (min-width: 390px) {
    :root {
      --peek-height: 22rem;
      --img-size: 20rem;
      --reveal-width: 60%;
    }

      .wcard__name {
      max-width: 12ch;
    }
    .wcard__dump {
      font-size: 0.74rem;
    }
  }
  @media (min-width: 900px) {
  .workout-cards {
    margin: 0 auto;
    padding: 1rem;
  }
}
</style>
